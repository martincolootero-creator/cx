<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pedido confirmado — CX Technology</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="cx-nav"></div>

<div class="success-wrap">
  <div class="success-icon">
    <svg width="40" height="40" fill="none" stroke="#2a8a4a" stroke-width="2" viewBox="0 0 24 24">
      <polyline points="20 6 9 17 4 12"/>
    </svg>
  </div>
  <h1>¡Pedido confirmado!</h1>
  <p>Gracias por tu compra. Recibirás un email con los detalles de tu pedido y la información de pago. Nuestro equipo se pondrá en contacto a la brevedad.</p>
  <p id="order-id" style="font-size:13px;color:var(--muted);margin-bottom:32px"></p>
  <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
    <a href="index.html" class="btn-primary">Volver al inicio</a>
    <a href="category.html" class="btn-outline-white" style="color:var(--text);border-color:var(--border)">Ver más productos</a>
  </div>
</div>

<div id="cx-footer"></div>
<script src="js/data.js"></script>
<script>
document.addEventListener('DOMContentLoaded',()=>{
  const orderId = new URLSearchParams(location.search).get('order');
  if(orderId) document.getElementById('order-id').textContent = 'N° de pedido: ' + orderId;
});
</script>
</body>
</html>
