<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Catálogo — CX Technology</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="cx-nav"></div>

<div class="page-wrap">
  <div class="breadcrumb">
    <a href="index.html">CX</a>
    <span class="sep">›</span>
    <a href="category.html">Productos</a>
    <span class="sep" id="bc-sep" style="display:none">›</span>
    <span class="current" id="bc-current"></span>
  </div>

  <!-- FILTER BAR -->
  <div class="filter-bar">
    <button class="btn-all-filters" onclick="toggleAllFilters()">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="11" y1="18" x2="13" y2="18"/></svg>
      Todos los filtros
    </button>

    <div class="filter-drop" id="drop-cat">
      <button class="filter-drop-btn" onclick="toggleDrop('drop-cat')">
        Categoría
        <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
      </button>
      <div class="filter-drop-menu" id="menu-cat"></div>
    </div>

    <div class="filter-drop" id="drop-sort">
      <button class="filter-drop-btn" onclick="toggleDrop('drop-sort')">
        Ordenar
        <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
      </button>
      <div class="filter-drop-menu">
        <a href="#" onclick="setSort('default',this)">Relevancia</a>
        <a href="#" onclick="setSort('price-asc',this)">Menor precio</a>
        <a href="#" onclick="setSort('price-desc',this)">Mayor precio</a>
        <a href="#" onclick="setSort('name',this)">Nombre A–Z</a>
      </div>
    </div>

    <div class="filter-drop" id="drop-badge">
      <button class="filter-drop-btn" onclick="toggleDrop('drop-badge')">
        Destacados
        <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
      </button>
      <div class="filter-drop-menu">
        <a href="#" onclick="setBadge('',this)">Todos</a>
        <a href="#" onclick="setBadge('Superventas',this)">Superventas</a>
        <a href="#" onclick="setBadge('Nuevo',this)">Novedades</a>
        <a href="#" onclick="setBadge('oferta',this)">Ofertas</a>
      </div>
    </div>

    <span class="result-count" id="resultCount"></span>
  </div>

  <!-- CATALOG GRID -->
  <div class="catalog-grid" id="catalogGrid"></div>

  <!-- LOAD MORE -->
  <div class="load-more-wrap" id="loadMoreWrap" style="display:none">
    <p class="load-more-info" id="loadMoreInfo"></p>
    <button class="btn-load-more" onclick="loadMore()">CARGAR MÁS</button>
  </div>
</div>

<div id="cx-footer"></div>
<script src="js/data.js"></script>
<script>
const params   = new URLSearchParams(location.search);
let activeCat  = params.get('id') || '';
let activeSort = 'default';
let activeBadge = '';
let visibleCount = 6;
const PAGE_SIZE  = 6;

document.addEventListener('DOMContentLoaded', () => {
  // Build category filter menu
  const cats = cx.getCategories();
  const menuCat = document.getElementById('menu-cat');
  menuCat.innerHTML =
    `<a href="#" onclick="setCat('',this)" class="${!activeCat?'active':''}">Todas las categorías</a>` +
    cats.map(c =>
      `<a href="#" onclick="setCat('${c.id}',this)" class="${c.id===activeCat?'active':''}">${c.label}</a>`
    ).join('');

  // Breadcrumb
  if(activeCat){
    const cat = cats.find(c=>c.id===activeCat);
    if(cat){
      document.getElementById('bc-sep').style.display='';
      document.getElementById('bc-current').textContent=cat.label;
      document.title = cat.label + ' — CX Technology';
    }
  }

  render();
});

function getFiltered() {
  let prods = activeCat ? cx.getByCat(activeCat) : cx.getProducts();
  if(activeBadge==='oferta') prods=prods.filter(p=>p.oldPrice);
  else if(activeBadge) prods=prods.filter(p=>p.badge===activeBadge);
  if(activeSort==='price-asc')  prods.sort((a,b)=>a.price-b.price);
  if(activeSort==='price-desc') prods.sort((a,b)=>b.price-a.price);
  if(activeSort==='name')       prods.sort((a,b)=>a.name.localeCompare(b.name));
  return prods;
}

function render() {
  const prods  = getFiltered();
  const cats   = cx.getCategories();
  const cat    = cats.find(c=>c.id===activeCat);
  const grid   = document.getElementById('catalogGrid');
  const visible = prods.slice(0, visibleCount);

  document.getElementById('resultCount').innerHTML =
    `Mostrando <strong>${Math.min(visibleCount, prods.length)}</strong> de <strong>${prods.length}</strong> productos`;

  // Build grid — hero card first, then products
  let html = '';

  // Hero banner (cat or generic)
  // Load admin-editable cat banner
  const catBanners = JSON.parse(localStorage.getItem('cx_cat_banners') || '{}');
  const catBanner  = activeCat && catBanners[activeCat] ? catBanners[activeCat] : null;

  const heroTitle = cat ? cat.label : 'Todos los productos';
  const heroDesc  = cat ? cat.desc  : 'Notebooks, Mini PCs, PCs de escritorio y gabinetes CX.';
  const heroImg   = catBanner?.image || (prods[0] ? prods[0].image : 'img/CX30615.png');
  const heroBg    = catBanner?.bg_color || '#1a1a1a';

  if (catBanner?.mode === 'image_only') {
    html += `<div style="grid-column:span 3;width:100%;overflow:hidden;border-radius:14px">
      ${catBanner.cta_link ? `<a href="${catBanner.cta_link}" style="display:block">` : '<div>'}
      <img src="${heroImg}" alt="${heroTitle}" style="width:100%;height:auto;display:block" onerror="this.style.opacity='.3'">
      ${catBanner.cta_link ? '</a>' : '</div>'}
    </div>`;
  } else {
    const bTitle = catBanner?.title || heroTitle;
    const bDesc  = catBanner?.desc  || heroDesc;
    html += `<div class="cat-hero-card" style="background:${heroBg}">
      <div class="hero-card-text">
        <h1>${bTitle}</h1>
        <p>${bDesc}</p>
      </div>
      <div class="hero-card-img">
        <img src="${heroImg}" alt="${bTitle}" onerror="this.style.opacity='.3'">
      </div>
    </div>`;
  }

  // First product in col 3 of row 1 (if exists)
  if(visible.length > 0) html += productCard(visible[0]);

  // Rest of products
  for(let i=1; i<visible.length; i++) html += productCard(visible[i]);

  if(!prods.length){
    grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:80px 0;color:var(--muted)">
      <p style="font-size:16px">No se encontraron productos en esta categoría.</p>
      <a href="category.html" style="color:var(--accent);margin-top:12px;display:inline-block">Ver todos los productos →</a>
    </div>`;
    document.getElementById('loadMoreWrap').style.display='none';
    return;
  }

  grid.innerHTML = html;

  // Load more
  const lmWrap = document.getElementById('loadMoreWrap');
  const lmInfo = document.getElementById('loadMoreInfo');
  if(prods.length > visibleCount){
    lmInfo.textContent = `Viendo ${Math.min(visibleCount,prods.length)} de ${prods.length}`;
    lmWrap.style.display='flex';
  } else {
    lmWrap.style.display='none';
  }
}

function loadMore() {
  visibleCount += PAGE_SIZE;
  render();
}

function setCat(id, el) {
  activeCat = id;
  visibleCount = PAGE_SIZE;
  document.querySelectorAll('#menu-cat a').forEach(a=>a.classList.remove('active'));
  if(el) el.classList.add('active');
  // Update breadcrumb
  const cats=cx.getCategories();
  const cat=cats.find(c=>c.id===id);
  document.getElementById('bc-sep').style.display=id?'':'none';
  document.getElementById('bc-current').textContent=cat?cat.label:'';
  closeDrop();
  render();
}

function setSort(val, el) {
  activeSort=val;
  document.querySelectorAll('#drop-sort .filter-drop-menu a').forEach(a=>a.classList.remove('active'));
  if(el) el.classList.add('active');
  closeDrop(); render();
}

function setBadge(val, el) {
  activeBadge=val;
  document.querySelectorAll('#drop-badge .filter-drop-menu a').forEach(a=>a.classList.remove('active'));
  if(el) el.classList.add('active');
  closeDrop(); render();
}

function toggleDrop(id) {
  const el=document.getElementById(id);
  const wasOpen=el.classList.contains('open');
  closeDrop();
  if(!wasOpen) el.classList.add('open');
}
function closeDrop() { document.querySelectorAll('.filter-drop').forEach(d=>d.classList.remove('open')); }
function toggleAllFilters() { /* puede expandirse */ }

document.addEventListener('click', e=>{
  if(!e.target.closest('.filter-drop')) closeDrop();
});
</script>
</body>
</html>
